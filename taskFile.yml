version: "3"

tasks:
  requirements:
    desc: "Установка venv и всех зависимостей"
    cmds:
      - python -m venv .venv
      - pip install -r requirements.txt
      - pip install k2==1.24.4.dev20260625+cpu.torch2.12.1 -f https://k2-fsa.github.io/k2/cpu.html
 
  run:
    desc: "Запуск приложения"
    cmds:
      - docker compose up -d
      - python -m uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
 
  resolve:
    desc: "Запустить CLI для уточнения неизвестных спикеров по ID встречи"
    cmds:
      - python -m app.cli.resolve {{.MEETING_ID}}
    requires:
      vars: [MEETING_ID]
